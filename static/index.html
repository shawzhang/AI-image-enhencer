<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Enhancer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Header -->
  <header id="app-header">
    <div id="header-content">
      <h1 id="app-title">✨ AI Image Enhancer</h1>
      <span id="device-badge" title="Processing device">⏳ Detecting device…</span>
    </div>
  </header>

  <main id="app-main">
    <!-- Upload Zone -->
    <section id="upload-section" aria-label="Image upload">
      <div id="upload-zone" tabindex="0" role="button" aria-label="Drop an image here or click to browse">
        <div id="upload-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <h2 id="upload-heading">Drop your image here</h2>
        <p id="upload-subtext">or <strong>click to browse</strong></p>
        <p id="upload-formats">Supports JPG, PNG, HEIC</p>
        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.heic" hidden>
      </div>
    </section>

    <!-- Comparison Viewer -->
    <section id="comparison-section" class="hidden" aria-label="Before and after comparison">
      <div id="comparison-container">
        <div id="comparison-wrapper">
          <!-- Before (original) image -->
          <div id="before-pane" class="comparison-pane">
            <img id="before-image" src="" alt="Original image">
            <span id="before-label" class="comparison-label">Original</span>
          </div>
          <!-- After (enhanced) image -->
          <div id="after-pane" class="comparison-pane">
            <img id="after-image" src="" alt="Enhanced image">
            <span id="after-label" class="comparison-label">Enhanced</span>
          </div>
          <!-- Draggable divider -->
          <div id="comparison-divider" role="separator" aria-label="Drag to compare before and after" tabindex="0">
            <div id="divider-handle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5l-5 7 5 7V5zm8 0v14l5-7-5-7z"/></svg>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Controls Panel -->
    <section id="controls-section" class="hidden" aria-label="Enhancement controls">
      <div id="controls-panel">

        <!-- Restoration Accordion -->
        <div id="restoration-group" class="control-group">
          <button id="restoration-toggle" class="accordion-toggle" aria-expanded="true" aria-controls="restoration-controls">
            <span class="accordion-icon">🔧</span>
            <h3 class="accordion-title">Restoration</h3>
            <span class="accordion-chevron">▾</span>
          </button>
          <div id="restoration-controls" class="accordion-body open">

            <!-- Noise Reduction -->
            <div class="control-row" id="noise-reduction-row">
              <label for="noise-reduction-slider" class="control-label">Noise Reduction</label>
              <div class="slider-group">
                <input type="range" id="noise-reduction-slider" class="styled-slider accent-blue"
                       min="0" max="30" step="1" value="0">
                <output id="noise-reduction-value" class="slider-value" for="noise-reduction-slider">0</output>
              </div>
            </div>

            <!-- Deblur / Clarity -->
            <div class="control-row" id="deblur-row">
              <label for="deblur-slider" class="control-label">Deblur / Clarity</label>
              <div class="slider-group">
                <input type="range" id="deblur-slider" class="styled-slider accent-purple"
                       min="0" max="5" step="0.1" value="0">
                <output id="deblur-value" class="slider-value" for="deblur-slider">0.0</output>
              </div>
            </div>

            <!-- Super-Resolution -->
            <div class="control-row" id="super-res-row">
              <label class="control-label">Super-Resolution</label>
              <div class="toggle-group">
                <label class="toggle-switch" for="super-res-toggle">
                  <input type="checkbox" id="super-res-toggle" role="switch">
                  <span class="toggle-track"></span>
                </label>
                <div id="super-res-scale-group" class="radio-group disabled">
                  <label class="radio-pill" for="super-res-2x">
                    <input type="radio" id="super-res-2x" name="super-res-scale" value="2x" checked>
                    <span class="radio-pill-label">2×</span>
                  </label>
                  <label class="radio-pill" for="super-res-4x">
                    <input type="radio" id="super-res-4x" name="super-res-scale" value="4x">
                    <span class="radio-pill-label">4×</span>
                  </label>
                </div>
              </div>
            </div>

            <!-- Face Restoration -->
            <div class="control-row" id="face-restore-row">
              <label class="control-label" for="face-restore-toggle">Face Restoration</label>
              <div class="toggle-group">
                <label class="toggle-switch" for="face-restore-toggle">
                  <input type="checkbox" id="face-restore-toggle" role="switch">
                  <span class="toggle-track"></span>
                </label>
              </div>
            </div>

          </div>
        </div>

        <!-- Enhancement Accordion -->
        <div id="enhancement-group" class="control-group">
          <button id="enhancement-toggle" class="accordion-toggle" aria-expanded="true" aria-controls="enhancement-controls">
            <span class="accordion-icon">🎨</span>
            <h3 class="accordion-title">Enhancement</h3>
            <span class="accordion-chevron">▾</span>
          </button>
          <div id="enhancement-controls" class="accordion-body open">

            <!-- Sharpness -->
            <div class="control-row" id="sharpness-row">
              <label for="sharpness-slider" class="control-label">Sharpness</label>
              <div class="slider-group">
                <input type="range" id="sharpness-slider" class="styled-slider accent-teal"
                       min="0" max="2" step="0.1" value="0.5">
                <output id="sharpness-value" class="slider-value" for="sharpness-slider">0.5</output>
              </div>
            </div>

            <!-- Contrast -->
            <div class="control-row" id="contrast-row">
              <label for="contrast-slider" class="control-label">Contrast</label>
              <div class="slider-group">
                <input type="range" id="contrast-slider" class="styled-slider accent-orange"
                       min="0.1" max="5" step="0.1" value="1.0">
                <output id="contrast-value" class="slider-value" for="contrast-slider">1.0</output>
              </div>
            </div>

            <!-- Color Saturation -->
            <div class="control-row" id="saturation-row">
              <label for="saturation-slider" class="control-label">Color Saturation</label>
              <div class="slider-group">
                <input type="range" id="saturation-slider" class="styled-slider accent-pink"
                       min="0" max="3" step="0.1" value="1.0">
                <output id="saturation-value" class="slider-value" for="saturation-slider">1.0</output>
              </div>
            </div>

            <!-- Brightness -->
            <div class="control-row" id="brightness-row">
              <label for="brightness-slider" class="control-label">Brightness</label>
              <div class="slider-group">
                <input type="range" id="brightness-slider" class="styled-slider accent-yellow"
                       min="-50" max="50" step="1" value="0">
                <output id="brightness-value" class="slider-value" for="brightness-slider">0</output>
              </div>
            </div>

            <!-- Color Temperature -->
            <div class="control-row" id="color-temp-row">
              <label for="color-temp-slider" class="control-label">Color Temperature</label>
              <div class="slider-group">
                <input type="range" id="color-temp-slider" class="styled-slider accent-red"
                       min="-30" max="30" step="1" value="0">
                <output id="color-temp-value" class="slider-value" for="color-temp-slider">0</output>
              </div>
            </div>

          </div>
        </div>

        <!-- Action Buttons -->
        <div id="action-bar">
          <button id="enhance-btn" type="button" disabled>
            <span id="enhance-btn-text">✨ Enhance</span>
          </button>
          <button id="monet-btn" type="button" title="Apply Monet Oil Painting Style">🎨 Monet</button>
          <button id="auto-btn" type="button" title="Analyze image and set optimal parameters">🤖 Auto</button>
          <button id="reset-btn" type="button" title="Reset all controls to defaults">↺ Reset</button>
        </div>

      </div>
    </section>

    <!-- Download Bar -->
    <section id="download-section" class="hidden" aria-label="Download enhanced image">
      <div id="download-bar">
        <h3 id="download-heading">Download Enhanced Image</h3>
        <div id="download-controls">
          <div id="format-selector" class="radio-group">
            <label class="radio-pill" for="format-jpeg">
              <input type="radio" id="format-jpeg" name="download-format" value="jpeg" checked>
              <span class="radio-pill-label">JPEG</span>
            </label>
            <label class="radio-pill" for="format-png">
              <input type="radio" id="format-png" name="download-format" value="png">
              <span class="radio-pill-label">PNG</span>
            </label>
          </div>
          <button id="download-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
        </div>
      </div>
    </section>

    <!-- Upload New Image -->
    <section id="new-upload-section" class="hidden" aria-label="Upload another image">
      <button id="new-upload-btn" type="button">📷 Upload New Image</button>
    </section>

  </main>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden" aria-live="assertive" role="status">
    <div id="loading-card">
      <div id="spinner"></div>
      <p id="loading-text">Enhancing your image…</p>
      <p id="loading-subtext">AI magic in progress</p>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
